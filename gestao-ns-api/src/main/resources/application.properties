# Connection with DB PostgrSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/braveheart_db
spring.datasource.username=mauro
spring.datasource.password=mauro


# Configuration of JPA (Hibernate)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Supabase Admin API Configuration

logging.level.org.hibernate=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
